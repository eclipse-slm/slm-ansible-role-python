---
# Purpose: assert that the instance really ended up in the expected state.
# Molecule calls this playbook with `molecule verify`.
- name: Verify
  hosts: all
  gather_facts: true
  vars:
    expected_min_python_version: "3.9"
  tasks:
    - name: Print discovered python version
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop:
        - "Discovered Python version: {{ ansible_facts['discovered_interpreter_python'] }}"
        - "Python version from ansible_facts: {{ ansible_facts['python_version'] }}"

    - name: "Assert Python {{ expected_min_python_version }} or higher is installed"
      ansible.builtin.assert:
        that: "ansible_facts['python_version'] is version(expected_min_python_version, '>=')"
        fail_msg: "Expected Python version {{ expected_min_python_version }} or higher is not installed. Found version: {{ ansible_facts['python_version'] }}"
        success_msg: "Expected Python version {{ expected_min_python_version }} or higher is installed. Found version: {{ ansible_facts['python_version'] }}"
